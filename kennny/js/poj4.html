	<h1>「燕火」</h1>
	
<p>規劃染黑設計類似雲塊斑剝的感覺，壺身淡<br>
   作品取自燕子在鳥巢簇擁的外觀。用抽象的<br>
   方式呈現，做出像是被包覆的感覺。<br><br>
   最終定位為燭台的造型作品，營造出溫暖滿<br>
   屋的感覺。<br><br>
   材質為紅銅，成品呈現以原始的底色，用金<br>
   屬焰燒法部分著色。想呈現古老製品的風格，<br>
   以不拋光、不電鍍的方式。<br>
   其中使用了 folding 的技法製作葉子的造型，<br>
   因為敲擊摺疊出尖銳的質感;壓克力模具做鳥<br>
   型零件，再微調成稍微不同的外觀，但總體架<br>
   構是相同的。</p>
